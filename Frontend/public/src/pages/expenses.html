<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WisePocket | Mis gastos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div id="appHeader"></div>
    <main class="layout">
        <section class="card">
            <h1 class="section-title">Mis gastos</h1>
            <div id="filtersBar" class="grid-4" style="margin-top:.8rem;">
                <label>Categoria<select id="filterCategory"></select></label>
                <label>Mes<select id="filterMonth"></select></label>
                <label>Ano<select id="filterYear"></select></label>
                <label>Comercio<input id="filterCommerce" type="text" placeholder="Buscar comercio"></label>
            </div>
            <div style="display:flex;gap:.5rem;margin-top:.8rem;">
                <button id="btnFilter" type="button" class="btn btn-primary">Filtrar</button>
                <button id="btnClearFilters" type="button" class="btn btn-secondary">Limpiar</button>
            </div>
            <p id="resultSummary" class="section-subtitle" style="margin-top:.8rem;"></p>
            <div class="table-wrap" id="tableExpensesWrap"></div>
            <div id="errorMessage" class="error-message hidden"></div>
            <div id="successMessage" class="success-message hidden"></div>
        </section>
    </main>

    <div id="modalEdit" class="modal hidden">
        <section class="card">
            <h2 class="section-title">Editar gasto</h2>
            <form id="editForm">
                <label>Comercio<input id="editCommerce" type="text" required></label>
                <label>Fecha<input id="editDate" type="date" required></label>
                <label>Monto<input id="editAmount" type="number" min="0" step="0.01" required></label>
                <label>Categoria<select id="editCategory" required></select></label>
                <label>Descripcion<textarea id="editDescription" maxlength="300"></textarea></label>
                <div style="display:flex;gap:.5rem;">
                    <button id="btnSaveEdit" type="button" class="btn btn-primary">Guardar cambios</button>
                    <button id="btnCancelEdit" type="button" class="btn btn-secondary">Cancelar</button>
                </div>
                <div id="editError" class="error-message hidden"></div>
            </form>
        </section>
    </div>

    <div id="modalDeleteConfirm" class="modal hidden">
        <section class="card">
            <h2 class="section-title">Eliminar gasto</h2>
            <p>Estas seguro que quieres eliminar este gasto? Esta accion no se puede deshacer.</p>
            <div style="display:flex;gap:.5rem;">
                <button id="btnConfirmDelete" class="btn btn-danger" type="button">Eliminar</button>
                <button id="btnCancelDelete" class="btn btn-secondary" type="button">Cancelar</button>
            </div>
            <div id="deleteError" class="error-message hidden"></div>
        </section>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/expenses.js"></script>
</body>
</html>
