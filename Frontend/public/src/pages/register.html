<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Claras | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1rem; }
        .auth-card { width: min(460px, 100%); }
        .auth-footer { margin-top: 0.6rem; color: var(--muted); }
    </style>
</head>
<body>
    <main class="auth-wrap">
        <section class="card auth-card">
            <a class="brand" href="index.html" style="display:flex;align-items:center;gap:0"><img src="../img/logo.svg" alt="Logo" style="height:5rem;width:auto"><span style="margin-left:-0.25rem">Cuentas Claras</span></a>
            <h1 class="section-title">Crear cuenta</h1>
            <form id="registerForm">
                <label>Nombre completo
                    <input id="inputName" type="text" placeholder="Tu nombre completo" required>
                </label>
                <label>Email
                    <input id="inputEmail" type="email" placeholder="tu@email.com" required>
                </label>
                <label>Contraseña
                    <input id="inputPassword" type="password" placeholder="Mínimo 6 caracteres" required>
                </label>
                <label>Confirmar contraseña
                    <input id="inputConfirmPassword" type="password" placeholder="Repetí tu contraseña" required>
                </label>
                <button id="btnRegister" type="button" class="btn btn-primary">Registrarse</button>
            </form>
            <div id="errorMessage" class="error-message hidden"></div>
            <div id="successMessage" class="success-message hidden"></div>
            <p class="auth-footer">Ya tenés cuenta? <a href="login.html">Iniciar sesión</a></p>

            <!-- Verification step (hidden until register succeeds) -->
            <div id="verifyStep" class="hidden" style="text-align:center;margin-top:1rem">
                <p style="margin-bottom:0.75rem">Ingresá el código de 6 dígitos que te enviamos a <strong id="verifyEmail"></strong></p>
                <div id="codeInputs" style="display:flex;gap:0.5rem;justify-content:center;margin-bottom:1rem">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                    <input class="code-digit" type="text" maxlength="1" inputmode="numeric" style="width:3rem;height:3.5rem;text-align:center;font-size:1.5rem;font-weight:700;border-radius:8px;border:2px solid var(--border,#ddd)">
                </div>
                <button id="btnVerify" class="btn btn-primary" type="button">Verificar</button>
                <div id="verifyMsg" class="hidden" style="margin-top:0.75rem"></div>
                <p style="margin-top:0.75rem;color:var(--muted);font-size:0.9rem">¿No recibiste el código? <button id="btnResendCode" type="button" style="color:#5c7aff;background:none;border:none;cursor:pointer;text-decoration:underline;font-size:0.9rem">Reenviar</button></p>
            </div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
