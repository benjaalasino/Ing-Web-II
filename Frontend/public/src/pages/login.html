<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Claras | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 1rem; }
        .auth-card { width: min(440px, 100%); }
        .auth-footer { margin-top: 0.6rem; color: var(--muted); }
    </style>
</head>
<body>
    <main class="auth-wrap">
        <section class="card auth-card">
            <a class="brand" href="index.html" style="display:flex;align-items:center;gap:.5rem"><img src="../img/logo.png" alt="Logo" style="height:2.5rem;width:auto">Cuentas Claras</a>
            <h1 class="section-title">Iniciar sesión</h1>
            <p class="section-subtitle">Demo user: user@cuentasclaras.com / 123456 | advisor: advisor@cuentasclaras.com / 123456</p>

            <form id="loginForm">
                <label>Email
                    <input id="inputEmail" type="email" placeholder="tu@email.com" required>
                </label>
                <label>Contraseña
                    <input id="inputPassword" type="password" placeholder="******" required>
                </label>
                <button id="btnLogin" class="btn btn-primary" type="button">Entrar</button>
            </form>

            <div id="errorMessage" class="error-message hidden"></div>
            <p class="auth-footer">No tenés cuenta? <a href="register.html">Registrarte</a></p>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
