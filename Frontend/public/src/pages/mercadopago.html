<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Claras | MercadoPago</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div id="appHeader"></div>
    <main class="layout">
        <section class="card">
            <h1 class="section-title">Gastos de MercadoPago</h1>
            <p class="section-subtitle">Se registran automáticamente cuando pagás con transferencia o QR.</p>
            <div id="mpAlert" class="hidden" style="margin-top:.75rem"></div>
            <div id="filtersBar" class="grid-3" style="margin-top:.8rem;">
                <label>Categoría<select id="filterCategory"></select></label>
                <label>Mes<select id="filterMonth"></select></label>
                <label>Año<select id="filterYear"></select></label>
            </div>
            <div style="display:flex;gap:.5rem;margin-top:.8rem;">
                <button id="btnFilter" type="button" class="btn btn-primary">Filtrar</button>
                <button id="btnClearFilters" type="button" class="btn btn-secondary">Limpiar</button>
            </div>
            <p id="resultSummary" class="section-subtitle" style="margin-top:.8rem;"></p>
            <div class="table-wrap" id="tablePaymentsWrap"></div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/mercadopago.js"></script>
</body>
</html>
