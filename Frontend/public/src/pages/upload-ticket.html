<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Claras | Subir ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            background: var(--surface-soft);
            transition: border-color var(--t-fast), background var(--t-fast);
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--primary);
            background: var(--accent-light);
        }
        .upload-zone .bi {
            font-size: 2.5rem;
            color: var(--primary);
        }
        .preview-container img {
            max-width: 220px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .field-warning {
            border-color: var(--warning) !important;
            box-shadow: 0 0 0 .2rem rgba(217,119,6,.15) !important;
        }
        .mode-toggle .btn { min-width: 140px; }
    </style>
</head>
<body>
    <div id="appHeader"></div>
    <main class="layout">
        <section class="card">
            <h1 class="section-title mb-3"><i class="bi bi-receipt me-2"></i>Registrar nuevo gasto</h1>

            <!-- Mode toggle -->
            <div class="mode-toggle d-flex gap-2 mb-3">
                <button id="modeManual" type="button" class="btn btn-primary">
                    <i class="bi bi-pencil-square me-1"></i>Carga manual
                </button>
                <button id="modeTicket" type="button" class="btn btn-outline-secondary">
                    <i class="bi bi-camera me-1"></i>Subir ticket
                </button>
            </div>

            <!-- Upload area -->
            <section id="ticketUploadArea" class="hidden mb-3">
                <div class="upload-zone" id="dropZone">
                    <i class="bi bi-cloud-arrow-up d-block mb-2"></i>
                    <p class="mb-1 fw-semibold">Arrastra la foto de tu ticket aquí o haz clic para seleccionar</p>
                    <p class="text-muted small mb-2">JPG, PNG o WEBP — máx. 5 MB</p>
                    <p class="text-muted small mb-0"><i class="bi bi-info-circle me-1"></i>¿Tenés un PDF o comprobante digital? Sacale una captura de pantalla y subí la foto.</p>
                    <input id="inputTicketImage" type="file" accept="image/jpeg,image/png,image/webp" class="d-none">
                </div>
                <div class="preview-container text-center mt-3">
                    <img id="ticketPreview" class="hidden" alt="Preview">
                </div>
                <p id="ticketProcessingStatus" class="text-muted small mt-2 mb-0"></p>
                <button id="btnProcessTicket" type="button" class="btn btn-success mt-3 hidden">
                    <i class="bi bi-stars me-1"></i>Procesar con IA
                </button>
            </section>

            <!-- Expense form -->
            <form id="expenseForm">
                <div class="mb-3">
                    <label for="inputCommerce" class="form-label fw-semibold">Comercio</label>
                    <input id="inputCommerce" type="text" class="form-control" placeholder="Ej: Supermercado Dia" maxlength="100" required>
                </div>
                <div class="mb-3">
                    <label for="inputDate" class="form-label fw-semibold">Fecha</label>
                    <input id="inputDate" type="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="inputAmount" class="form-label fw-semibold">Monto</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input id="inputAmount" type="number" class="form-control" min="0" step="0.01" placeholder="0.00" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="selectCategory" class="form-label fw-semibold">Categoría</label>
                    <select id="selectCategory" class="form-select" required>
                        <option value="" selected disabled>Selecciona una categoría</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="inputDescription" class="form-label fw-semibold">Descripción</label>
                    <textarea id="inputDescription" class="form-control" maxlength="300" rows="2" placeholder="Descripción opcional..."></textarea>
                </div>
                <button id="btnSaveExpense" type="button" class="btn btn-primary w-100">
                    <i class="bi bi-check-lg me-1"></i>Guardar gasto
                </button>
            </form>

            <div id="errorMessage" class="alert alert-danger mt-3 hidden"></div>
            <div id="successMessage" class="alert alert-success mt-3 hidden"></div>
            <div id="postSuccessActions" class="hidden mt-3 d-flex gap-2">
                <button id="btnRegisterAnother" class="btn btn-outline-secondary" type="button">
                    <i class="bi bi-plus-circle me-1"></i>Registrar otro
                </button>
                <a class="btn btn-primary" href="expenses.html">
                    <i class="bi bi-list-ul me-1"></i>Ver mis gastos
                </a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/upload-ticket.js"></script>
</body>
</html>
