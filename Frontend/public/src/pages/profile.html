<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuentas Claras | Mi perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div id="appHeader"></div>
    <main class="layout grid-2">
        <section class="card">
            <h1 class="section-title">Mi perfil</h1>
            <form id="profileForm">
                <label>Nombre<input id="inputProfileName" type="text" required></label>
                <label>Email<input id="inputProfileEmail" type="email" required></label>
                <label>Rol<input id="inputProfileRole" type="text" disabled></label>
                <button id="btnSaveProfile" class="btn btn-primary" type="button">Guardar cambios</button>
            </form>
            <div id="profileMessage" class="hidden"></div>
        </section>

        <section class="card">
            <h2 class="section-title">Cambiar contraseña</h2>
            <form id="passwordForm">
                <label>Contraseña actual<input id="inputCurrentPassword" type="password" required></label>
                <label>Nueva contraseña<input id="inputNewPassword" type="password" required></label>
                <label>Confirmar nueva<input id="inputConfirmNewPassword" type="password" required></label>
                <button id="btnChangePassword" class="btn btn-primary" type="button">Cambiar contraseña</button>
            </form>
            <div id="passwordMessage" class="hidden"></div>
        </section>

        <section class="card" id="mpSection">
            <h2 class="section-title">MercadoPago</h2>
            <p class="section-subtitle">Conectá tu cuenta para importar tus pagos automáticamente.</p>
            <div id="mpStatus" style="margin:.75rem 0">
                <p style="color:var(--muted)">Cargando estado...</p>
            </div>
            <div id="mpTokenForm" class="hidden">
                <label>Access Token
                    <input id="inputMpToken" type="password" placeholder="APP_USR-..." required>
                </label>
                <p style="font-size:.75rem;color:var(--muted);margin:.25rem 0 .75rem">Obtenelo en <a href="https://www.mercadopago.com.ar/developers/panel/app" target="_blank" rel="noopener" style="color:var(--primary)">mercadopago.com.ar/developers</a> → Tu aplicación → Credenciales de producción.</p>
                <button id="btnMpSaveToken" class="btn btn-primary" type="button">Conectar</button>
            </div>
            <div id="mpMessage" class="hidden"></div>
        </section>
    </main>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
